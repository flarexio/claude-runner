name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/claude-runner/Dockerfile
          push: true
          tags: |
            flarexio/claude-runner:${{ steps.version.outputs.full }}
            flarexio/claude-runner:${{ steps.version.outputs.minor }}
            flarexio/claude-runner:${{ steps.version.outputs.major }}
            flarexio/claude-runner:latest

  release-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/claude-runner-client/Dockerfile
          push: true
          tags: |
            flarexio/claude-runner-client:${{ steps.version.outputs.full }}
            flarexio/claude-runner-client:${{ steps.version.outputs.minor }}
            flarexio/claude-runner-client:${{ steps.version.outputs.major }}
            flarexio/claude-runner-client:latest
