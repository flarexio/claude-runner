# workDir: ~/.flarex/claude-runner/workspaces

allowedTools:
- Read
- Glob
- Grep
- Bash

maxTurns: 10

# model: claude-sonnet-4-6

# event=issue overrides; empty fields fall back to the top-level values.
issue:
  bypassPermissions: false
  maxTurns: 30
  # preserveOnFailure: keep the cloned workspace when claude exits non-zero
  # for operator inspection. Defaults to true.
  preserveOnFailure: true
