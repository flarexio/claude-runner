# workDir: ~/.flarex/claude-runner/workspaces
allowedTools:
- Read
- Glob
- Grep
- Bash
maxTurns: 10
# event=issue overrides. Empty fields fall back to the top-level values.
# Issue mode needs Edit/Write to actually implement tasks, and usually
# benefits from more turns than CI-style review.
#
# bypassPermissions: true passes --dangerously-skip-permissions to claude
# (no per-tool prompts, ignores allowedTools). Only safe behind the label
# + author_association gates documented in the README.
issue:
  bypassPermissions: false
  maxTurns: 30
